name: Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      # Astro + @astrojs/cloudflare: static assets in dist/client via [assets]; Worker bundle in dist/server.
      - name: Ensure KV namespace (id for inject step)
        id: kv
        run: |
          set -euo pipefail
          npx wrangler kv namespace create "KV_STATUS_PAGE" 2>/dev/null || true

          KV_NAMESPACE_ID=$(node <<'NODE'
          const https = require('https');
          const account = process.env.CF_ACCOUNT_ID;
          const token = process.env.CF_API_TOKEN;
          const opts = {
            hostname: 'api.cloudflare.com',
            path: `/client/v4/accounts/${account}/storage/kv/namespaces`,
            headers: { Authorization: `Bearer ${token}` },
          };
          const req = https.request(opts, (res) => {
            let b = '';
            res.on('data', (c) => (b += c));
            res.on('end', () => {
              const j = JSON.parse(b);
              const list = j.result || [];
              const kv = list.find((x) => String(x.title || '').includes('KV_STATUS_PAGE'));
              if (!kv || !kv.id) {
                console.error('Could not find KV_STATUS_PAGE namespace in API response');
                process.exit(1);
              }
              process.stdout.write(kv.id);
            });
          });
          req.on('error', (e) => {
            console.error(e);
            process.exit(1);
          });
          req.end();
          NODE
          )
          echo "KV_NAMESPACE_ID=${KV_NAMESPACE_ID}" >> "$GITHUB_ENV"
          # KV binding for deploy is injected into dist/server/wrangler.json (see inject-kv-binding step).

      # Wrangler redirects to dist/server/wrangler.json (from Astro); [env.production] KV in wrangler.toml is not merged into that file — inject binding or the Worker ships without KV.
      - name: Inject KV binding into Astro wrangler.json
        run: node scripts/inject-kv-binding.mjs
        env:
          KV_NAMESPACE_ID: ${{ env.KV_NAMESPACE_ID }}

      - name: Deploy Worker (Wrangler 4)
        run: npx wrangler deploy --env production

      - name: Upload Worker secrets
        env:
          SECRET_SLACK_WEBHOOK_URL: ${{ secrets.SECRET_SLACK_WEBHOOK_URL }}
          SECRET_TELEGRAM_API_TOKEN: ${{ secrets.SECRET_TELEGRAM_API_TOKEN }}
          SECRET_TELEGRAM_CHAT_ID: ${{ secrets.SECRET_TELEGRAM_CHAT_ID }}
          SECRET_DISCORD_WEBHOOK_URL: ${{ secrets.SECRET_DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          put() {
            local name="$1"
            local val="${2:-default-gh-action-secret}"
            printf '%s' "$val" | npx wrangler secret put "$name" --env production
          }
          put SECRET_SLACK_WEBHOOK_URL "${SECRET_SLACK_WEBHOOK_URL:-default-gh-action-secret}"
          put SECRET_TELEGRAM_API_TOKEN "${SECRET_TELEGRAM_API_TOKEN:-default-gh-action-secret}"
          put SECRET_TELEGRAM_CHAT_ID "${SECRET_TELEGRAM_CHAT_ID:-default-gh-action-secret}"
          put SECRET_DISCORD_WEBHOOK_URL "${SECRET_DISCORD_WEBHOOK_URL:-default-gh-action-secret}"

      - name: KV garbage-collect script
        env:
          KV_NAMESPACE_ID: ${{ env.KV_NAMESPACE_ID }}
        run: npm run kv-gc
