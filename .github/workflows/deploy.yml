name: Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Wrangler v1 reads CF_API_TOKEN (and expects ~/.wrangler/config/default.toml if env is missing)
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      # Wrangler v1 requires ~/.wrangler/config/default.toml (or CF_API_TOKEN in env — set both).
      - name: Wrangler v1 API token config file
        run: |
          mkdir -p "$HOME/.wrangler/config"
          printf 'api_token = "%s"\n' "$CF_API_TOKEN" > "$HOME/.wrangler/config/default.toml"
          test -s "$HOME/.wrangler/config/default.toml"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      # Flareact + Workers Sites use Wrangler v1. The old cloudflare/wrangler-action@1 Docker image (Node 12) breaks on current APIs and used a fragile `kv:namespace list | head -1` pipe (Rust panic: Broken pipe).
      - name: Ensure KV namespace and production env in wrangler.toml
        id: kv
        run: |
          set -euo pipefail
          npx wrangler kv:namespace create "KV_STATUS_PAGE" 2>/dev/null || true

          KV_NAMESPACE_ID=$(node <<'NODE'
          const https = require('https');
          const account = process.env.CF_ACCOUNT_ID;
          const token = process.env.CF_API_TOKEN;
          const opts = {
            hostname: 'api.cloudflare.com',
            path: `/client/v4/accounts/${account}/storage/kv/namespaces`,
            headers: { Authorization: `Bearer ${token}` },
          };
          const req = https.request(opts, (res) => {
            let b = '';
            res.on('data', (c) => (b += c));
            res.on('end', () => {
              const j = JSON.parse(b);
              const list = j.result || [];
              const kv = list.find((x) => String(x.title || '').includes('KV_STATUS_PAGE'));
              if (!kv || !kv.id) {
                console.error('Could not find KV_STATUS_PAGE namespace in API response');
                process.exit(1);
              }
              process.stdout.write(kv.id);
            });
          });
          req.on('error', (e) => {
            console.error(e);
            process.exit(1);
          });
          req.end();
          NODE
          )
          echo "KV_NAMESPACE_ID=${KV_NAMESPACE_ID}" >> "$GITHUB_ENV"

          # Do not match commented examples in wrangler.toml
          if grep -v '^[[:space:]]*#' wrangler.toml | grep -qF 'KV_STATUS_PAGE'; then
            echo "wrangler.toml already configures KV_STATUS_PAGE; skipping append."
            exit 0
          fi

          {
            echo ""
            echo "[env.production]"
            echo "kv-namespaces = ["
            echo "  { binding = \"KV_STATUS_PAGE\", id = \"${KV_NAMESPACE_ID}\", preview_id = \"${KV_NAMESPACE_ID}\" }"
            echo "]"
          } >> wrangler.toml

      - name: Publish Worker (Wrangler 1)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.wrangler/config"
          printf 'api_token = "%s"\n' "$CF_API_TOKEN" > "$HOME/.wrangler/config/default.toml"
          npx wrangler publish --env production

      - name: Upload Worker secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SECRET_SLACK_WEBHOOK_URL: ${{ secrets.SECRET_SLACK_WEBHOOK_URL }}
          SECRET_TELEGRAM_API_TOKEN: ${{ secrets.SECRET_TELEGRAM_API_TOKEN }}
          SECRET_TELEGRAM_CHAT_ID: ${{ secrets.SECRET_TELEGRAM_CHAT_ID }}
          SECRET_DISCORD_WEBHOOK_URL: ${{ secrets.SECRET_DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.wrangler/config"
          printf 'api_token = "%s"\n' "$CF_API_TOKEN" > "$HOME/.wrangler/config/default.toml"
          put() {
            local name="$1"
            local val="${2:-default-gh-action-secret}"
            printf '%s' "$val" | npx wrangler secret put "$name" --env production
          }
          put SECRET_SLACK_WEBHOOK_URL "${SECRET_SLACK_WEBHOOK_URL:-default-gh-action-secret}"
          put SECRET_TELEGRAM_API_TOKEN "${SECRET_TELEGRAM_API_TOKEN:-default-gh-action-secret}"
          put SECRET_TELEGRAM_CHAT_ID "${SECRET_TELEGRAM_CHAT_ID:-default-gh-action-secret}"
          put SECRET_DISCORD_WEBHOOK_URL "${SECRET_DISCORD_WEBHOOK_URL:-default-gh-action-secret}"

      - name: KV garbage-collect script
        env:
          KV_NAMESPACE_ID: ${{ env.KV_NAMESPACE_ID }}
        run: npm run kv-gc
