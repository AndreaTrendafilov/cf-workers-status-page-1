name = "cf-workers-status-page"
main = "dist/server/cloudflare-worker.mjs"
compatibility_date = "2024-11-10"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[assets]
binding = "ASSETS"
directory = "./dist/client"

[triggers]
crons = ["* * * * *"]

# Without this, `wrangler deploy --env production` deploys to a *second* Worker
# (name suffixed with `-production`), so *.workers.dev for that host stays stale
# while `cf-workers-status-page.<subdomain>.workers.dev` may point at a different deploy.
[env.production]
name = "cf-workers-status-page"
