settings:
  title: "Status Page"
  url: "https://status.tikvite.org" # used for Slack messages
  logo: logo-192x192.png # image in ./public/ folder
  daysInHistogram: 92 # number of days you want to display in histogram
  collectResponseTimes: true # collects avg response times from CRON locations

  # Probes: default HTTP timeout (ms), Slack/Telegram/Discord only after N consecutive failed checks (per-monitor override: alertAfterConsecutiveFailures)
  defaultTimeoutMs: 25000
  alertAfterConsecutiveFailures: 1

  allmonitorsOperational: "All Systems Operational"
  notAllmonitorsOperational: "Not All Systems Operational"
  monitorLabelOperational: "Operational"
  monitorLabelNotOperational: "Not Operational"
  monitorLabelDegraded: "Degraded" # HTTP OK but slower than maxResponseTimeMs
  monitorLabelNoData: "No data"
  defaultMonitorGroup: "Services" # monitors without `group` land here
  graphSlowResponseHint: "slow vs threshold"
  dayInHistogramNoData: "No data"
  dayInHistogramOperational: "All good"
  dayInHistogramNotOperational: " incident(s)" # xx incident(s) recorded

  # Extra chart labels (optional)
  graphSectionAvailability: "Availability by day"
  graphSectionLatency: "Response time (daily average across PoPs)"
  graphUptimeLabel: "Uptime"
  graphDaysSampledLabel: "days with data"
  graphIncidentsLabel: "Days with failures"
  graphFailedChecksLabel: "failed checks total"
  graphLastCheckLabel: "Last check"
  graphLatencyTitle: "Response time trend"
  graphRecentLatencyLabel: "Last 7d avg"
  graphLatencyFailHint: "failed check(s) this day"

  # Per-monitor collapsible "Details" (optional labels)
  monitorDetailsTitle: "Details & history"
  monitorDetailsPieSection: "Availability & response time (histogram window)"
  monitorDetailsLatencySection: "Daily avg latency"
  monitorDetailsLogSection: "Recent checks"
  pieGoodDaysLabel: "All clear"
  pieBadDaysLabel: "With incidents"
  pieNoDataDaysLabel: "No data"
  pieWindowHint: "Counted after monitoring started for this target"
  pieStackBarLabel: "Stacked day mix"
  logLastCheckAtLabel: "Last probe"
  logLastSeenUpLabel: "Last time up"
  logLastSeenDownLabel: "Last time down"

monitors:
  # Optional per monitor (Uptime Kuma–like):
  #   group: 'Websites'
  #   expectStatus: 200            # or [200, 204] for multiple acceptable codes
  #   responseContains: '<html'   # body must include (GET/POST; not HEAD)
  #   responseNotContains: 'error'  # fail if body contains (e.g. maintenance banner)
  #   headers: { X-Key: "value" }  # extra request headers
  #   timeoutMs: 15000             # override settings.defaultTimeoutMs
  #   retries: 2                   # extra attempts after first failure (max 5)
  #   retryDelayMs: 500            # pause between retries
  #   alertAfterConsecutiveFailures: 3  # notify only after 3 failed checks in a row
  #   maxResponseTimeMs: 3000      # Degraded if HTTP OK but slower than this (ms)
  - id: tikvite-org # unique identifier
    name: tikvite.org
    group: Websites
    description: "home sweet home" # default=empty
    url: "https://tikvite.org" # URL to fetch
    method: GET # default=GET
    expectStatus: 200 # operational status, default=200
    followRedirect: false # should fetch follow redirects, default=false
    linkable: false # allows the title to be a link, default=true

  - id: chat-tikvite-org
    name: Chat
    group: Websites
    description: "If it dies, it dies."
    url: "https://chat.tikvite.org"
    method: GET
    expectStatus: 200
    linkable: true # allows the title to be a link, default=true

  - id: Naphtha.dev
    name: Naphtha.dev
    group: Websites
    description: "just in case"
    url: "https://naphtha.dev"
    method: GET # default=GET
    expectStatus: 200 # operational status, default=200
    followRedirect: false # should fetch follow redirects, default=false
    linkable: false # allows the title to be a link, default=true
